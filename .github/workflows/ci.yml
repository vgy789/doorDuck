name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      INTENSIVE_MSK_URL: ${{ secrets.INTENSIVE_MSK_URL }}
      INTENSIVE_NSK_URL: ${{ secrets.INTENSIVE_NSK_URL }}
      INTENSIVE_KZN_URL: ${{ secrets.INTENSIVE_KZN_URL }}
      DONATE_PHONE_VALUE: ${{ secrets.DONATE_PHONE_VALUE }}
      DONATE_CARD_VALUE: ${{ secrets.DONATE_CARD_VALUE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Lint
        run: ./gradlew :app:lintDebug

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
