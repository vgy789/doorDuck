name: Release By Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${ANDROID_KEYSTORE_BASE64}"
          test -n "${ANDROID_KEYSTORE_PASSWORD}"
          test -n "${ANDROID_KEY_ALIAS}"
          test -n "${ANDROID_KEY_PASSWORD}"

      - name: Prepare release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p .ci
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > .ci/release-keystore.jks

      - name: Build release APK
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/.ci/release-keystore.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"

          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "${APK_PATH}" ]]; then
            echo "Signed APK not found at ${APK_PATH}"
            ls -la app/build/outputs/apk/release || true
            exit 1
          fi

          APK_BASENAME="$(basename "${APK_PATH}")"
          RELEASE_APK_NAME="doorDuck-${TAG_NAME}-${APK_BASENAME}"
          cp "${APK_PATH}" "${RELEASE_APK_NAME}"
          sha256sum "${RELEASE_APK_NAME}" > "${RELEASE_APK_NAME}.sha256"
          cp "${APK_PATH}" "doorDuck-latest.apk"
          sha256sum "doorDuck-latest.apk" > "doorDuck-latest.apk.sha256"

          echo "apk_file=${RELEASE_APK_NAME}" >> "${GITHUB_OUTPUT}"
          echo "sha_file=${RELEASE_APK_NAME}.sha256" >> "${GITHUB_OUTPUT}"
          echo "latest_apk_file=doorDuck-latest.apk" >> "${GITHUB_OUTPUT}"
          echo "latest_sha_file=doorDuck-latest.apk.sha256" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.apk_file }}
            ${{ steps.assets.outputs.sha_file }}
            ${{ steps.assets.outputs.latest_apk_file }}
            ${{ steps.assets.outputs.latest_sha_file }}
